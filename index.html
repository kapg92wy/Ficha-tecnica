<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Galex · Ficha Técnica + Requisición</title>
<style>
  :root{ --blue:#1313CC; --ink:#1a1a1a; --mut:#888; --line:#E8EAF6; --soft:#EEF0FF; --card:#DDE0F5; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:#ECEEFF; font-family:'Segoe UI',system-ui,-apple-system,sans-serif; color:var(--ink); }
  input,textarea,select,button{ font-family:inherit; }

  /* HEADER */
  .hdr{ background:var(--blue); padding:11px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20; box-shadow:0 2px 10px rgba(19,19,204,.25); flex-wrap:wrap; gap:8px; }
  .hdr-l{ display:flex; align-items:center; gap:12px; }
  .wordmark{ font-size:17px; font-weight:800; color:#fff; letter-spacing:.14em; }
  .hdr-sep{ color:rgba(255,255,255,.3); font-size:18px; }
  .hdr-sub{ font-size:12px; font-weight:500; color:rgba(255,255,255,.72); }
  .hdr-r{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .btn-ghost{ background:none; border:1.5px solid rgba(255,255,255,.35); color:rgba(255,255,255,.85); font-size:11.5px; font-weight:500; border-radius:6px; padding:6px 14px; cursor:pointer; transition:background .15s; }
  .btn-ghost:hover{ background:rgba(255,255,255,.12); }
  .btn-white{ background:#fff; color:var(--blue); border:none; font-size:12px; font-weight:600; border-radius:6px; padding:7px 16px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:opacity .15s; }
  .btn-white:hover{ opacity:.88; }
  .btn-white[disabled]{ opacity:.4; cursor:not-allowed; }

  /* MODE SWITCH */
  .modes{ background:#fff; border-bottom:1px solid var(--line); padding:0 24px; display:flex; gap:0; overflow-x:auto; align-items:center; }
  .mode-tab{ padding:13px 20px; font-size:12.5px; font-weight:500; color:var(--mut); border:none; background:none; cursor:pointer; border-bottom:2.5px solid transparent; transition:color .15s,border-color .15s; white-space:nowrap; }
  .mode-tab:hover{ color:var(--blue); }
  .mode-tab.on{ color:var(--blue); font-weight:600; border-bottom-color:var(--blue); }
  .toggle-wrap{ margin-left:auto; display:flex; align-items:center; gap:8px; padding:8px 0; font-size:11.5px; color:#555; }
  .switch{ position:relative; width:38px; height:21px; }
  .switch input{ opacity:0; width:0; height:0; }
  .slider{ position:absolute; inset:0; background:#ccc; border-radius:21px; transition:.2s; cursor:pointer; }
  .slider:before{ content:""; position:absolute; height:15px; width:15px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
  .switch input:checked + .slider{ background:var(--blue); }
  .switch input:checked + .slider:before{ transform:translateX(17px); }

  /* FICHA TABS */
  .ftabs{ background:#fff; border-bottom:1px solid var(--line); padding:0 24px; display:flex; overflow-x:auto; }
  .ftab{ padding:12px 18px; font-size:12px; font-weight:500; color:var(--mut); border:none; background:none; cursor:pointer; border-bottom:2.5px solid transparent; transition:.15s; white-space:nowrap; }
  .ftab:hover{ color:var(--blue); }
  .ftab.on{ color:var(--blue); font-weight:600; border-bottom-color:var(--blue); }
  .ftab .dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background:#2e9e5b; margin-left:6px; vertical-align:middle; }

  /* CARD */
  .wrap{ max-width:980px; margin:26px auto 48px; padding:0 20px; }
  .card{ background:#fff; border-radius:12px; border:1px solid var(--card); overflow:hidden; box-shadow:0 4px 20px rgba(19,19,204,.07); }
  .card-hd{ background:var(--soft); padding:16px 24px; border-bottom:1px solid var(--card); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .badge-num{ width:32px; height:32px; background:var(--blue); color:#fff; font-size:12px; font-weight:700; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .card-title{ font-size:17px; font-weight:700; color:var(--blue); flex:1; }
  .pill{ background:#fff; color:var(--blue); font-size:9px; font-weight:700; padding:3px 11px; border-radius:12px; border:1px solid #C5CAE9; letter-spacing:.05em; text-transform:uppercase; }
  .sku-box{ display:flex; align-items:center; gap:7px; }
  .sku-box .lbl{ font-size:9px; font-weight:600; color:var(--mut); text-transform:uppercase; letter-spacing:.1em; }

  .lbl{ font-size:8.5px; font-weight:600; color:var(--mut); text-transform:uppercase; letter-spacing:.14em; margin-bottom:5px; display:block; }
  .fi{ width:100%; border:1.5px solid #E0E3F0; border-radius:5px; padding:8px 10px; font-size:12.5px; background:#FAFBFF; outline:none; color:var(--ink); resize:vertical; }
  .fi:focus{ border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px rgba(19,19,204,.1); }
  .fi-sku{ border:1.5px solid var(--blue); border-radius:5px; padding:4px 10px; font-size:11px; font-weight:700; color:var(--blue); font-family:ui-monospace,Menlo,monospace; background:var(--soft); outline:none; width:150px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .body-grid{ padding:24px; display:grid; grid-template-columns:1fr 210px; gap:22px; }
  .fields{ display:flex; flex-direction:column; gap:15px; }
  .upload{ width:100%; flex:1; min-height:200px; background:var(--soft); border:1.5px dashed var(--blue); border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; overflow:hidden; position:relative; transition:background .15s; }
  .upload:hover{ background:#E4E7FF; }
  .upload img{ width:100%; height:200px; object-fit:contain; }
  .btn-clear{ background:none; border:1px solid #C5CAE9; color:var(--mut); font-size:10.5px; border-radius:5px; padding:4px 10px; cursor:pointer; }
  .btn-clear:hover{ border-color:#f44; color:#f44; }
  .btn-line{ background:#fff; border:1px solid #C5CAE9; color:var(--blue); font-size:11px; font-weight:600; border-radius:6px; padding:6px 12px; cursor:pointer; }
  .btn-line:hover{ background:#EEF0FF; }
  .btn-danger{ border-color:#f2b8b8; color:#b42318; }
  .btn-danger:hover{ background:#fff1f1; }
  .photo-thumb{ max-width:78px; max-height:54px; object-fit:contain; border:1px solid #cfd4e8; background:#fff; }

  .sigs{ padding:18px 24px; border-top:1px solid var(--line); background:#FAFBFF; display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:24px; align-items:end; }
  .sig-lbl{ font-size:8px; font-weight:600; color:var(--mut); text-transform:uppercase; letter-spacing:.12em; margin-bottom:20px; }
  .fi-sig{ border:none; border-bottom:1.5px solid #C5CAE9; padding:4px 0; font-size:12px; background:transparent; outline:none; width:100%; color:var(--ink); }
  .fi-sig:focus{ border-bottom-color:var(--blue); }
  .card-ft{ padding:10px 24px; border-top:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; background:#fff; }
  .card-ft .mut{ font-size:10px; color:#bbb; }

  /* Datos de compra dentro de la ficha */
  .req-extra{ margin:0 24px 4px; border:1.5px dashed #C5CAE9; border-radius:9px; background:#F7F8FF; padding:14px 16px; }
  .req-extra-hd{ font-size:12px; font-weight:700; color:var(--blue); display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:12px; }
  .req-inc-lbl{ font-size:11px; font-weight:500; color:#555; display:flex; align-items:center; gap:5px; margin-left:auto; }
  .grid4{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; }
  .req-extra-total{ margin-top:11px; font-size:12px; color:#555; text-align:right; }
  .req-extra-total b{ color:var(--blue); font-size:13px; }

  /* REQUISICION editor */
  .req-note{ background:#EEF0FF; border:1px solid #C5CAE9; border-radius:8px; padding:11px 14px; font-size:12px; color:#3b3f8f; margin-bottom:18px; display:flex; gap:9px; align-items:flex-start; }
  .sec-title{ font-size:11px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.08em; margin:22px 0 12px; padding-bottom:6px; border-bottom:1px solid var(--line); }
  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  .rtable{ width:100%; border-collapse:collapse; margin-top:8px; font-size:12px; }
  .rtable th{ background:#8F98A5; color:#fff; font-size:10px; font-weight:700; padding:7px 6px; border:1px solid #6f7a88; text-align:center; }
  .rtable th.orange{ background:#E8A15C; }
  .rtable td{ border:1px solid #cfd4e8; padding:4px; vertical-align:middle; }
  .rtable td.c{ text-align:center; }
  .rtable input{ width:100%; border:none; background:transparent; padding:4px; font-size:12px; outline:none; }
  .rtable input:focus{ background:#EEF0FF; }
  .rtable tr.off{ opacity:.4; }
  .rtable .idx{ width:26px; text-align:center; color:#555; font-weight:600; }
  .rtable .chk{ width:34px; text-align:center; }
  .total-row td{ background:#eef0ff; font-weight:700; }

  /* PRINT: FICHA (HTML rendition) */
  .print-only{ display:none; }
  @media print{
    .no-print{ display:none !important; }
    body{ background:#fff; }
    body[data-print="ficha"] #view-req-print, body[data-print="ficha"] #app{ display:none; }
    body[data-print="ficha"] #ficha-print{ display:block; }
    body[data-print="req"] #ficha-print, body[data-print="req"] #app{ display:none; }
    body[data-print="req"] #view-req-print{ display:block; }
    @page{ size:letter landscape; margin:10mm; }
  }

  /* FCM-01 print form */
  #view-req-print{ display:none; padding:0; }
  .fcm{ width:100%; border-collapse:collapse; font-family:Calibri,'Segoe UI',sans-serif; font-size:11px; color:#000; }
  .fcm td{ border:none; padding:2px 4px; vertical-align:middle; }
  .fcm .box{ border:1px solid #000; }
  .fcm-title{ background:#8F98A5; color:#000; font-size:18px; font-weight:700; text-align:center; padding:8px; border:1px solid #000; }
  .fcm-lbl{ font-weight:700; }
  .fcm-val{ background:#DEEBF6; border-bottom:1px solid #000; }
  .fcm-opt{ font-weight:700; border:1px solid #000; }
  .fcm-x{ width:22px; height:20px; border:1px solid #000; text-align:center; font-weight:700; background:#DEEBF6; }
  .fcm-hd th{ border:1px solid #000; background:#8F98A5; color:#000; font-size:10px; font-weight:700; padding:5px 3px; text-align:center; }
  .fcm-hd th.orange{ background:#F8CBAD; }
  .fcm-row td{ border:1px solid #000; font-size:10px; text-align:center; font-weight:700; color:#0070C0; padding:4px 3px; }
  .fcm-row img{ max-width:88px; max-height:60px; object-fit:contain; }
  .fcm-row td.plain{ color:#000; font-weight:400; }
  .fcm-sig{ text-align:center; font-size:11px; }
  .fcm-sig .name{ height:34px; }
  .fcm-sig .line{ border-top:1px solid #000; padding-top:2px; }
</style>
</head>
<body data-print="none">

<!-- ============ MAIN APP ============ -->
<div id="app">
  <div class="hdr no-print">
    <div class="hdr-l">
      <span class="wordmark">GALEX</span>
      <span class="hdr-sep">|</span>
      <span class="hdr-sub" id="hdr-sub">Ficha Técnica · Publicidad Impresa</span>
    </div>
    <div class="hdr-r">
      <button class="btn-ghost" id="btn-reset">Limpiar</button>
      <button class="btn-white" id="btn-print-ficha">🖨 Imprimir ficha</button>
      <button class="btn-white" id="btn-print-req">🖨 Imprimir requisición</button>
    </div>
  </div>

  <div class="modes no-print">
    <button class="mode-tab on" data-mode="ficha">Productos gráficos</button>
    <label class="toggle-wrap">
      <span>Requiere requisición de compra</span>
      <span class="switch"><input type="checkbox" id="req-toggle"><span class="slider"></span></span>
    </label>
  </div>

  <!-- FICHA VIEW -->
  <div id="view-ficha">
    <div class="ftabs no-print" id="ftabs"></div>
    <div class="wrap">
      <div class="card no-print" id="common-card" style="padding:20px 24px; margin-bottom:18px;"></div>
      <div class="card" id="ficha-card"></div>
    </div>
  </div>

</div>

<!-- ============ PRINT: FICHA ============ -->
<div id="ficha-print" class="print-only"></div>

<!-- ============ PRINT: REQUISICION (FCM-01) ============ -->
<div id="view-req-print"></div>

<script>
const MATS = ['Productos gráficos'];
const TYPES = ['Material gráfico'];
const DEFSKU = ['GAL-GRF-001'];

function defaultSku(i){ return 'GAL-GRF-'+String(i+1).padStart(3,'0'); }
function blankFicha(i){ return { sku:defaultSku(i), descripcion:'', dimensiones:'', sustrato:'', acabado:'', tipoImpresion:'', pantone:'', archivosEditables:'', observaciones:'', imagen:null,
  sigElabora:'', sigReviso:'', sigAutorizo:'', sigFecha:'',
  incluir:true, cantidad:'', umedida:'PZA', moneda:'MXN', precio:'' }; }

const HDR = { solicitante:'',departamento:'',folio:'',autoriza:'',fechaElab:'',fechaEntrega:'',
  tipo:'Inventariable',compania:'Play',area:'',segmento:'',
  fSolicita:'',fAutoriza:'',fComprador:'',fGerente:'' };

let state = { tab:0, mode:'ficha', reqEnabled:true, forms:[blankFicha(0)], hdr:{...HDR} };

const LS='galex_ficha_req_v1';
function save(){ localStorage.setItem(LS, JSON.stringify({forms:state.forms,hdr:state.hdr,reqEnabled:state.reqEnabled})); }
function load(){ try{ const s=JSON.parse(localStorage.getItem(LS)); if(s){ if(s.forms&&s.forms.length) state.forms=s.forms.map((f,i)=>{ const item={...blankFicha(i),...f}; const oldKey='prove'+'edor'; if(!item.archivosEditables && /^https?:\/\//i.test(String(item[oldKey]||''))){ item.archivosEditables=item[oldKey]; } delete item[oldKey]; return item; }); if(s.hdr) state.hdr={...HDR,...s.hdr}; if(typeof s.reqEnabled==='boolean') state.reqEnabled=s.reqEnabled; } }catch(e){} }

const $=(id)=>document.getElementById(id);
const esc=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const money=(n)=> '$'+(Number(n)||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});

/* ---------- FICHA RENDER ---------- */
function renderFtabs(){
  const el=$('ftabs'); el.innerHTML='';
  state.forms.forEach((f,i)=>{
    const b=document.createElement('button');
    b.className='ftab'+(state.tab===i?' on':'');
    const filled = f.descripcion || f.archivosEditables;
    b.innerHTML = ('0'+(i+1)).slice(-2)+' · '+esc(f.sku||('SKU '+(i+1)))+(filled?'<span class="dot"></span>':'');
    b.onclick=()=>{ state.tab=i; renderFtabs(); renderFicha(); };
    el.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='ftab';
  add.innerHTML='+ Agregar producto';
  add.onclick=addProduct;
  el.appendChild(add);
}

function addProduct(){
  state.forms.push(blankFicha(state.forms.length));
  state.tab=state.forms.length-1;
  save(); renderFtabs(); renderFicha();
}

function removeCurrentProduct(){
  if(state.forms.length===1){ alert('Debe quedar al menos un producto.'); return; }
  if(!confirm('¿Eliminar este producto de la requisición?')) return;
  state.forms.splice(state.tab,1);
  state.tab=Math.max(0,state.tab-1);
  save(); renderFtabs(); renderFicha();
}

function fld(label,key,ph,ta){
  const f=state.forms[state.tab];
  const v=esc(f[key]);
  if(ta) return `<div><label class="lbl">${label}</label><textarea class="fi" rows="${ta}" data-k="${key}" placeholder="${ph}">${v}</textarea></div>`;
  return `<div><label class="lbl">${label}</label><input class="fi" data-k="${key}" value="${v}" placeholder="${ph}"></div>`;
}

function hdrFld(label,key,ph,type='text'){
  const v=esc(state.hdr[key]);
  return `<div><label class="lbl">${label}</label><input class="fi" type="${type}" data-h="${key}" value="${v}" placeholder="${ph}"></div>`;
}
function hdrSelect(label,key,opts){
  const val=state.hdr[key]||'';
  return `<div><label class="lbl">${label}</label><select class="fi" data-h="${key}">${opts.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select></div>`;
}

function renderCommon(){
  $('common-card').innerHTML=`
    <div class="req-extra-hd">Solicitud de compra</div>
    <div class="grid3">
      ${hdrFld('Nombre solicitante','solicitante','Ej. ALBA ARREDONDO')}
      ${hdrFld('Departamento','departamento','Ej. MKT')}
      ${hdrFld('Folio','folio','Folio')}
      ${hdrFld('Autoriza','autoriza','Ej. DAVID ARCINIEGA')}
      ${hdrFld('Fecha de elaboración','fechaElab','', 'date')}
      ${hdrFld('Fecha compromiso de entrega','fechaEntrega','Ej. VIERNES 3 JULIO')}
      ${hdrSelect('Tipo de compra','tipo',['Inventariable','No inventariable','Servicios','Proyectos','Muestra'])}
      ${hdrSelect('Compañía que comprará','compania',['GDL COIN','Gato','Indus-trade','Play','Empresa Directa','Torre de Juegos','Zona','Agrocultivos Ler'])}
      ${hdrFld('Área solicitante','area','Área')}
      ${hdrFld('Segmento','segmento','Segmento')}
    </div>
    <div class="sec-title">Firmas de requisición</div>
    <div class="grid4">
      ${hdrFld('Solicita','fSolicita','Nombre')}
      ${hdrFld('Autoriza','fAutoriza','Nombre')}
      ${hdrFld('Comprador','fComprador','Nombre')}
      ${hdrFld('Gerente de compras','fGerente','Nombre')}
    </div>`;
  $('common-card').querySelectorAll('[data-h]').forEach(inp=>{
    inp.addEventListener('input',e=>{ state.hdr[e.target.dataset.h]=e.target.value; save(); });
    inp.addEventListener('change',e=>{ state.hdr[e.target.dataset.h]=e.target.value; save(); });
  });
  applyReqState();
}

function renderFicha(){
  const f=state.forms[state.tab], i=state.tab;
  $('ficha-card').innerHTML = `
    <div class="card-hd">
      <div class="badge-num">${('0'+(i+1)).slice(-2)}</div>
      <span class="card-title">Productos gráficos · Producto ${i+1}</span>
      <span class="pill">Material gráfico</span>
      <div class="sku-box"><span class="lbl" style="margin:0;">SKU:</span>
        <input class="fi-sku" data-k="sku" value="${esc(f.sku)}" placeholder="GAL-XXX-000"></div>
      <button class="btn-line btn-danger no-print" id="btn-remove-product" type="button">Eliminar producto</button>
    </div>
    <div class="body-grid">
      <div class="fields">
        ${fld('Descripción','descripcion','Describa el material: uso, características, aplicación...',3)}
        <div class="grid2">
          ${fld('Dimensiones / Medidas','dimensiones','Ej. 5 cm × 5 cm')}
          ${fld('Tipo de papel / Sustrato','sustrato','Ej. Couché 150g, vinil 80g...')}
        </div>
        ${fld('Acabado','acabado','Ej. Barniz UV, plastificado mate, corte al contorno...')}
        <div class="grid2">
          ${fld('Tipo de impresión','tipoImpresion','Ej. Offset, Digital, Serigrafía, UV...')}
          ${fld('Colores Pantone','pantone','Ej. PMS 286 C')}
        </div>
        <div><label class="lbl">Archivos editables (link)</label><input class="fi" type="url" data-k="archivosEditables" value="${esc(f.archivosEditables)}" placeholder="https://link-a-editables"></div>
        ${fld('Observaciones internas','observaciones','Notas adicionales para la ficha técnica...',2)}
      </div>
      <div style="display:flex; flex-direction:column; gap:8px;">
        <label class="lbl">Foto / imagen para requisición</label>
        <label class="upload">
          <input type="file" accept="image/*" id="fimg" style="display:none;">
          ${ f.imagen ? `<img src="${f.imagen}">` :
            `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#1313CC" stroke-width="1.2" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
             <span style="font-size:10px; font-weight:500; color:#1313CC; opacity:.5; text-align:center; line-height:1.6; padding:0 14px;">Haz clic para subir<br>foto del producto</span>` }
        </label>
        ${ f.imagen ? `<button class="btn-clear" id="fimg-clear">✕ Quitar imagen</button>` : '' }
      </div>
    </div>
    ${ state.reqEnabled ? `
    <div class="req-extra no-print">
      <div class="req-extra-hd">🛒 Datos para Requisición de Compra
      </div>
      <div class="grid4">
        <div><label class="lbl">Cantidad</label><input class="fi" type="number" min="0" data-k="cantidad" value="${esc(f.cantidad)}" placeholder="0"></div>
        <div><label class="lbl">U. de Medida</label><input class="fi" data-k="umedida" value="${esc(f.umedida)}" placeholder="PZA"></div>
        <div><label class="lbl">Moneda</label><input class="fi" data-k="moneda" value="${esc(f.moneda)}" placeholder="MXN"></div>
        <div><label class="lbl">Precio unitario</label><input class="fi" type="number" min="0" step="0.01" data-k="precio" value="${esc(f.precio)}" placeholder="0.00"></div>
      </div>
      <div class="req-extra-total">Total de esta partida: <b id="fk-total">${money((Number(f.cantidad)||0)*(Number(f.precio)||0))}</b></div>
    </div>` : '' }

    <div class="sigs">
      <div><div class="sig-lbl">Elaboró</div><input class="fi-sig" data-k="sigElabora" value="${esc(f.sigElabora)}" placeholder="Nombre y puesto"></div>
      <div><div class="sig-lbl">Revisó</div><input class="fi-sig" data-k="sigReviso" value="${esc(f.sigReviso)}" placeholder="Nombre y puesto"></div>
      <div><div class="sig-lbl">Autorizó</div><input class="fi-sig" data-k="sigAutorizo" value="${esc(f.sigAutorizo)}" placeholder="Nombre y puesto"></div>
      <div><div class="sig-lbl">Fecha</div><input class="fi" type="date" data-k="sigFecha" value="${esc(f.sigFecha)}" style="padding:7px 10px;"></div>
    </div>
    <div class="card-ft">
      <span class="mut">GALEX · Uso interno · Mercadotecnia &amp; Almacén</span>
      <span class="mut" style="font-family:ui-monospace,Menlo,monospace;">${esc(f.sku)}</span>
    </div>`;

  $('ficha-card').querySelectorAll('[data-k]').forEach(inp=>{
    inp.addEventListener('input',e=>{ const cf=state.forms[state.tab]; cf[e.target.dataset.k]=e.target.value; save();
      if(['cantidad','precio'].includes(e.target.dataset.k)){ const t=$('fk-total'); if(t) t.textContent=money((Number(cf.cantidad)||0)*(Number(cf.precio)||0)); } });
    inp.addEventListener('change',()=>{ save(); if(['sku','descripcion','archivosEditables'].includes(inp.dataset.k)) renderFtabs(); });
  });
  const fimg=$('fimg');
  if(fimg) fimg.addEventListener('change',e=>{ const file=e.target.files[0]; if(!file) return;
    const r=new FileReader(); r.onload=ev=>{ state.forms[state.tab].imagen=ev.target.result; save(); renderFicha(); }; r.readAsDataURL(file); });
  const fc=$('fimg-clear'); if(fc) fc.onclick=()=>{ state.forms[state.tab].imagen=null; save(); renderFicha(); };
  const rm=$('btn-remove-product'); if(rm) rm.onclick=removeCurrentProduct;
}

function reqRowsData(){ // product graphics sheet feeds the purchase request automatically
  return state.forms.map((f,i)=>({f,i})).filter(x=> x.f.sku||x.f.descripcion||x.f.archivosEditables||x.f.cantidad||x.f.precio);
}

/* ---------- MODE ---------- */
function applyReqState(){
  const toggle=$('req-toggle');
  if(toggle) toggle.checked=state.reqEnabled;
  const card=$('common-card');
  if(card) card.style.display=state.reqEnabled?'':'none';
  const reqBtn=$('btn-print-req');
  if(reqBtn) reqBtn.style.display=state.reqEnabled?'':'none';
  const hdr=$('hdr-sub');
  if(hdr) hdr.textContent=state.reqEnabled?'Productos gráficos · Ficha técnica + Solicitud de compra':'Productos gráficos · Ficha técnica';
}

function setMode(m){
  state.mode=m;
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===m));
  $('view-ficha').style.display = m==='ficha'?'':'none';
  applyReqState();
}

/* ---------- PRINT FICHA (HTML) ---------- */

  const f=state.forms[state.tab], i=state.tab;
  const box=(label,val,h='42px')=>`<div><div style="font-size:8px;font-weight:700;color:#888;letter-spacing:.22em;text-transform:uppercase;margin-bottom:5px;">${label}</div><div style="min-height:${h};border:1.4px solid #BFC6F4;border-radius:6px;background:#FAFBFF;padding:8px 10px;font-size:13px;color:#555;line-height:1.35;">${esc(val)||'&nbsp;'}</div></div>`;
  $('ficha-print').innerHTML=`
    <div style="font-family:'Segoe UI',sans-serif;background:#ECEEFF;padding:18px 28px;min-height:560px;color:#1a1a1a;">
      <div style="max-width:1030px;margin:0 auto;background:#fff;border:1px solid #CFD3E8;border-radius:12px;overflow:hidden;">
        <div style="background:#EEF0FF;border-bottom:1px solid #DDE0F5;padding:22px 28px;display:flex;align-items:center;gap:14px;">
          <div style="width:34px;height:34px;border-radius:50%;background:#1313CC;color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;">${String(i+1).padStart(2,'0')}</div>
          <div style="font-size:19px;font-weight:800;color:#1313CC;flex:1;">Productos gráficos</div>
          <div style="border:1.4px solid #BFC6F4;border-radius:14px;background:#fff;color:#1313CC;font-size:10px;font-weight:800;padding:4px 18px;">MATERIAL GRÁFICO</div>
          <div style="font-size:10px;color:#888;letter-spacing:.18em;font-weight:700;">SKU:</div>
          <div style="border:1.6px solid #1313CC;border-radius:5px;color:#1313CC;font-family:ui-monospace,Menlo,monospace;font-weight:800;font-size:11px;padding:7px 16px;min-width:140px;text-align:center;">${esc(f.sku)}</div>
        </div>
        <div style="padding:26px 28px 24px;display:grid;grid-template-columns:1fr 230px;gap:24px;">
          <div style="display:flex;flex-direction:column;gap:13px;">
            ${box('Descripción',f.descripcion,'56px')}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              ${box('Dimensiones / Medidas',f.dimensiones)}
              ${box('Tipo de papel / Sustrato',f.sustrato)}
            </div>
            ${box('Acabado',f.acabado)}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              ${box('Tipo de impresión',f.tipoImpresion)}
              ${box('Colores Pantone',f.pantone)}
            </div>
            ${box('Archivos editables',f.archivosEditables,'38px')}
            ${box('Observaciones',f.observaciones,'48px')}
          </div>
          <div>
            <div style="font-size:8px;font-weight:700;color:#888;letter-spacing:.22em;text-transform:uppercase;margin-bottom:10px;">Imagen de referencia</div>
            <div style="height:385px;border:1.4px dashed #1313CC;border-radius:8px;background:#EEF0FF;display:flex;align-items:center;justify-content:center;text-align:center;color:#6E76E8;font-size:12px;">
              ${ f.imagen? `<img src="${f.imagen}" style="max-width:100%;max-height:100%;object-fit:contain;">`:'Imagen de referencia' }
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:26px;background:#FAFBFF;border-top:1px solid #E8EAF6;padding:20px 28px;">
          ${[['Elaboró',f.sigElabora],['Revisó',f.sigReviso],['Autorizó',f.sigAutorizo],['Fecha',f.sigFecha]].map(([label,val])=>`
            <div><div style="font-size:8px;font-weight:700;color:#888;letter-spacing:.16em;text-transform:uppercase;margin-bottom:18px;">${label}</div><div style="border-bottom:1.4px solid #BFC6F4;padding:0 0 6px;color:#555;font-size:12px;min-height:22px;">${esc(val)||'&nbsp;'}</div></div>
          `).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;color:#aaa;font-size:10px;padding:10px 28px;border-top:1px solid #E8EAF6;">
          <span>GALEX · Uso interno · Mercadotecnia &amp; Almacén</span>
          <span style="font-family:ui-monospace,Menlo,monospace;">${esc(f.sku)}</span>
        </div>
      </div>
    </div>`;
}

/* ---------- PRINT REQUISICION (FCM-01 HTML) ---------- */
function buildReqPrint(){
  const h=state.hdr; const rows=reqRowsData();
  const X=(cond)=> cond?'<div class="fcm-x">X</div>':'<div class="fcm-x"></div>';
  const opt=(name,sel)=>`<td class="fcm-opt" style="padding:3px 8px;">${name}</td><td>${X(sel===name)}</td>`;
  const link=(url)=> /^https?:\/\//i.test(String(url||''))?`<a href="${esc(url)}" style="color:#0070C0;">Abrir archivo</a>`:esc(url);
  let total=0;
  const bodyRows = rows.map((x,k)=>{
    const f=x.f; const t=(Number(f.cantidad)||0)*(Number(f.precio)||0); total+=t;
    return `<tr class="fcm-row">
      <td class="plain" style="width:26px;">${k+1}</td>
      <td>${esc(f.sku)}</td>
      <td style="text-align:left;">${esc(f.descripcion)}</td>
      <td class="plain" style="word-break:break-all;">${link(f.archivosEditables)}</td>
      <td class="plain">${esc(f.cantidad)}</td>
      <td class="plain">${esc(f.umedida)}</td>
      <td class="plain">${esc(f.moneda)}</td>
      <td class="plain">${f.precio!==''?money(f.precio):''}</td>
      <td class="plain">${t?money(t):''}</td>
      <td class="plain">${f.imagen?`<img src="${f.imagen}" alt="Foto producto ${k+1}">`:''}</td>
    </tr>`;
  }).join('');
  // pad to at least 6 rows for form look
  let pad=''; for(let k=rows.length;k<6;k++){ pad+=`<tr class="fcm-row"><td class="plain">${k+1}</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`; }

  $('view-req-print').innerHTML=`
  <div style="font-family:Calibri,'Segoe UI',sans-serif;color:#000;">
    <div style="display:flex;justify-content:flex-end;font-size:10px;font-weight:700;margin-bottom:2px;">FCM-01 · Rev 03</div>
    <div class="fcm-title">REQUISICIÓN DE COMPRA</div>
    <table class="fcm" style="margin-top:8px;">
      <tr>
        <td class="fcm-lbl" style="width:150px;">*Nombre Solicitante:</td>
        <td class="fcm-val" style="width:230px;">${esc(h.solicitante)}</td>
        <td style="width:60px;"></td>
        <td class="fcm-lbl" style="text-align:right;width:70px;">FOLIO:</td>
        <td class="fcm-val">${esc(h.folio)}</td>
      </tr>
      <tr><td class="fcm-lbl">*Departamento:</td><td class="fcm-val">${esc(h.departamento)}</td><td colspan="3"></td></tr>
      <tr><td class="fcm-lbl">*Autoriza:</td><td class="fcm-val">${esc(h.autoriza)}</td><td colspan="3"></td></tr>
      <tr>
        <td class="fcm-lbl">*Fecha de elaboración:</td><td class="fcm-val">${esc(fmtDate(h.fechaElab))}</td>
        <td></td><td class="fcm-lbl" style="text-align:right;font-size:10px;">Fecha compromiso:</td><td class="fcm-val">${esc(h.fechaEntrega)}</td>
      </tr>
    </table>

    <table class="fcm" style="margin-top:10px;">
      <tr>
        <td class="fcm-lbl" style="width:120px;vertical-align:top;">*Tipo de compra:</td>
        <td>
          <table class="fcm"><tbody>
            ${['Inventariable','No inventariable','Servicios','Proyectos','Muestra'].map(o=>`<tr>${opt(o,h.tipo)}</tr>`).join('')}
          </tbody></table>
        </td>
        <td class="fcm-lbl" style="text-align:right;vertical-align:top;width:140px;">Compañía que comprará:</td>
        <td style="vertical-align:top;">
          <table class="fcm"><tbody>
            ${[['GDL COIN','Empresa Directa'],['Gato','Torre de Juegos'],['Indus-trade','Zona'],['Play','Agrocultivos Ler']].map(pair=>
              `<tr>${opt(pair[0],h.compania)}<td style="width:8px;"></td>${opt(pair[1],h.compania)}</tr>`).join('')}
          </tbody></table>
        </td>
      </tr>
      <tr>
        <td class="fcm-lbl">Área solicitante:</td><td class="fcm-val">${esc(h.area)}</td>
        <td class="fcm-lbl" style="text-align:right;">Segmento:</td><td class="fcm-val">${esc(h.segmento)}</td>
      </tr>
    </table>

    <table class="fcm" style="margin-top:12px;">
      <thead><tr class="fcm-hd">
        <th style="width:26px;">#</th><th class="orange" style="width:80px;">Código Galex</th>
        <th>Descripción (Detalle del producto solicitado)</th><th style="width:100px;">Archivos editables / Link</th>
        <th style="width:56px;">Cantidad</th><th style="width:50px;">U. de Medida</th><th style="width:48px;">Moneda</th>
        <th style="width:64px;">Precio Unitario</th><th style="width:70px;">Total</th><th style="width:120px;">Observaciones</th>
      </tr></thead>
      <tbody>${bodyRows}${pad}</tbody>
      <tr class="fcm-row"><td colspan="8" style="text-align:right;font-weight:700;color:#000;">TOTAL</td><td class="plain" style="font-weight:700;">${money(total)}</td><td></td></tr>
    </table>

    <table class="fcm" style="margin-top:26px;">
      <tr class="fcm-sig">
        ${[['Solicita',h.fSolicita],['Autoriza',h.fAutoriza],['Comprador',h.fComprador],['Gerente de compras',h.fGerente]].map(s=>
          `<td style="width:25%;"><div class="name">${esc(s[1])}</div><div class="line" style="font-weight:700;">${s[0]}</div><div style="font-size:10px;">Nombre y firma</div></td>`).join('')}
      </tr>
    </table>
    <div style="font-size:10px;font-weight:700;margin-top:14px;">Anexo: Fichas técnicas / imágenes</div>
    <div style="font-size:10px;font-weight:700;">NOTA: Para el producto de muestra o proyecto no requiere código de sistema</div>
  </div>`;
}
function fmtDate(d){ if(!d) return ''; const p=d.split('-'); return p.length===3? `${p[2]}/${p[1]}/${p[0]}`:d; }

/* ---------- PRINT HANDLERS ---------- */
function printFicha(){ buildFichaPrint(); document.body.setAttribute('data-print','ficha'); window.print(); setTimeout(()=>document.body.setAttribute('data-print','none'),400); }
function printReq(){ if(!state.reqEnabled) return; buildReqPrint(); document.body.setAttribute('data-print','req'); window.print(); setTimeout(()=>document.body.setAttribute('data-print','none'),400); }
window.addEventListener('afterprint',()=>document.body.setAttribute('data-print','none'));

/* ---------- INIT ---------- */
function resetAll(){
  if(!confirm('¿Limpiar todos los campos?')) return;
  state.forms=[blankFicha(0)]; state.hdr={...HDR}; state.reqEnabled=true; save();
  renderCommon(); renderFtabs(); renderFicha();
}
function init(){
  load();
  renderCommon(); renderFtabs(); renderFicha();
  setMode('ficha');
  document.querySelectorAll('.mode-tab').forEach(t=>t.onclick=()=>setMode(t.dataset.mode));
  $('req-toggle').onchange=e=>{ state.reqEnabled=e.target.checked; save(); applyReqState(); renderFicha(); };
  $('btn-reset').onclick=resetAll;
  $('btn-print-ficha').onclick=printFicha;
  $('btn-print-req').onclick=printReq;
}
init();
</script>
</body>
</html>
